backend:
  name: github
  repo: GHAFRASYSTEM/website
  branch: main
  base_url: https://www.ghafra.com
  auth_endpoint: api/cms/oauth/authorize

local_backend: true

media_folder: 'public/images'
public_folder: '/images'

site_url: https://www.ghafra.com
display_url: https://www.ghafra.com
logo_url: /images/extracted/image-12.jpg

collections:
  - name: 'pages'
    label: 'Pages'
    files:
      - label: 'Home Page'
        name: 'home'
        file: 'content/home.md'
        fields:
          - {
              label: 'Meta Description',
              name: 'metaDescription',
              widget: 'text',
              hint: 'SEO description shown in search engine results.',
            }
          - { label: 'Hero Title', name: 'heroTitle', widget: 'string' }
          - { label: 'Hero Subtitle', name: 'heroSubtitle', widget: 'text' }
          - label: 'Hero CTA'
            name: 'heroCta'
            widget: 'object'
            fields:
              - { label: 'Button Text', name: 'text', widget: 'string' }
              - { label: 'Button Link', name: 'link', widget: 'string' }
          - { label: 'Mission Title', name: 'missionTitle', widget: 'string' }
          - { label: 'Mission Body', name: 'missionBody', widget: 'markdown' }
          - {
              label: 'Mission Image',
              name: 'missionImage',
              widget: 'image',
              hint: 'Image displayed beside the mission text.',
            }
          - label: 'Featured Program Slugs'
            name: 'featuredProgramSlugs'
            widget: 'list'
            field: { label: 'Program Slug', name: 'slug', widget: 'string' }
          - {
              label: '"What We Do" Section Title',
              name: 'whatWeDoTitle',
              widget: 'string',
              default: 'What We Do',
            }
          - {
              label: '"What We Do" Section Subtitle',
              name: 'whatWeDoSubtitle',
              widget: 'text',
              default: 'Discover how we support and empower the Ghanaian community in Lille through our activities and services.',
            }
          - {
              label: '"View All Activities" Button Text',
              name: 'viewAllActivitiesText',
              widget: 'string',
              default: 'View All Activities',
            }
          - {
              label: '"View All Activities" Button Link',
              name: 'viewAllActivitiesLink',
              widget: 'string',
              default: '/programs',
            }
          - {
              label: 'Gallery Section Title',
              name: 'galleryTitle',
              widget: 'string',
              default: 'Community Moments',
            }
          - {
              label: 'Gallery Section Subtitle',
              name: 'gallerySubtitle',
              widget: 'text',
              default: 'Highlights from our events, meetings, and activities that bring the Ghanaian community together.',
            }
          - label: 'Gallery Images'
            name: 'galleryImages'
            widget: 'list'
            summary: '{{fields.alt}}'
            fields:
              - { label: 'Image', name: 'src', widget: 'image' }
              - { label: 'Caption / Alt Text', name: 'alt', widget: 'string' }
          - label: 'App Download Section'
            name: 'appDownloadSection'
            widget: 'object'
            fields:
              - {
                  label: 'Eyebrow',
                  name: 'eyebrow',
                  widget: 'string',
                  default: 'Mobile Access',
                }
              - {
                  label: 'Title',
                  name: 'title',
                  widget: 'string',
                  default: 'Download the GHAFRA-NORD App and keep the community close at hand.',
                }
              - {
                  label: 'Body',
                  name: 'body',
                  widget: 'text',
                  default: 'With the GHAFRA-NORD app, you can jump straight into updates, programs, community resources and many more, right from your phone!',
                }
              - {
                  label: 'App Image',
                  name: 'appImage',
                  widget: 'image',
                  default: '/images/ghafra_app.jpeg',
                }
              - {
                  label: 'App Image Alt Text',
                  name: 'appImageAlt',
                  widget: 'string',
                  default: 'Screenshot of the GHAFRA-NORD mobile app home screen',
                }
              - {
                  label: 'Secondary App Image',
                  name: 'secondaryAppImage',
                  widget: 'image',
                  required: false,
                  default: '/images/ghafra_app.jpeg',
                }
              - {
                  label: 'Secondary App Image Alt Text',
                  name: 'secondaryAppImageAlt',
                  widget: 'string',
                  required: false,
                  default: 'Screenshot of the GHAFRA mobile app resources screen',
                }
              - label: 'App Store Button'
                name: 'appStoreButton'
                widget: 'object'
                fields:
                  - {
                      label: 'Pretitle',
                      name: 'pretitle',
                      widget: 'string',
                      default: 'Download on the',
                    }
                  - {
                      label: 'Title',
                      name: 'title',
                      widget: 'string',
                      default: 'App Store',
                    }
                  - {
                      label: 'Link',
                      name: 'link',
                      widget: 'string',
                      default: 'https://example.com/app-store',
                    }
              - label: 'Google Play Button'
                name: 'googlePlayButton'
                widget: 'object'
                fields:
                  - {
                      label: 'Pretitle',
                      name: 'pretitle',
                      widget: 'string',
                      default: 'Get it on',
                    }
                  - {
                      label: 'Title',
                      name: 'title',
                      widget: 'string',
                      default: 'Google Play',
                    }
                  - {
                      label: 'Link',
                      name: 'link',
                      widget: 'string',
                      default: 'https://example.com/google-play',
                    }
          - { label: 'CTA Title', name: 'ctaTitle', widget: 'string' }
          - { label: 'CTA Body', name: 'ctaBody', widget: 'text' }
          - label: 'CTA Button'
            name: 'ctaButton'
            widget: 'object'
            fields:
              - { label: 'Button Text', name: 'text', widget: 'string' }
              - { label: 'Button Link', name: 'link', widget: 'string' }
          - label: 'Member CTA Button'
            name: 'memberCta'
            widget: 'object'
            fields:
              - {
                  label: 'Button Text',
                  name: 'text',
                  widget: 'string',
                  default: 'Become a Member',
                }
              - {
                  label: 'Button Link',
                  name: 'link',
                  widget: 'string',
                  default: '/get-involved#membership',
                }

      - label: 'About Us'
        name: 'about'
        file: 'content/about.md'
        fields:
          - {
              label: 'Meta Description',
              name: 'metaDescription',
              widget: 'text',
              hint: 'SEO description shown in search engine results.',
            }
          - { label: 'Page Title', name: 'title', widget: 'string' }
          - {
              label: 'Executive Detail Back Link Text',
              name: 'executiveDetailBackLinkText',
              widget: 'string',
              default: 'Back to About',
            }
          - {
              label: 'Executive Detail Label',
              name: 'executiveDetailLabel',
              widget: 'string',
              default: 'Executive Profile',
            }
          - {
              label: 'Mission Section Title',
              name: 'missionSectionTitle',
              widget: 'string',
              default: 'Our Mission',
            }
          - {
              label: 'Vision Section Title',
              name: 'visionSectionTitle',
              widget: 'string',
              default: 'Our Vision',
            }
          - { label: 'History Title', name: 'historyTitle', widget: 'string' }
          - { label: 'History Body', name: 'historyBody', widget: 'markdown' }
          - { label: 'Mission Statement', name: 'mission', widget: 'text' }
          - { label: 'Vision Statement', name: 'vision', widget: 'text' }
          - {
              label: 'Values Section Title',
              name: 'valuesSectionTitle',
              widget: 'string',
              default: 'Our Values',
            }
          - label: 'Core Values'
            name: 'values'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - {
                  label: 'Icon',
                  name: 'icon',
                  widget: 'string',
                  hint: 'Icon name (e.g., heart, globe, eye, users)',
                }
          - {
              label: 'Executives Section Title',
              name: 'executivesSectionTitle',
              widget: 'string',
              default: 'Our Executives',
            }
          - label: 'Timeline Events'
            name: 'timelineEvents'
            widget: 'list'
            fields:
              - { label: 'Year', name: 'year', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
          - {
              label: 'FAQ Section Title',
              name: 'faqSectionTitle',
              widget: 'string',
              default: 'Frequently Asked Questions',
            }
          - {
              label: 'FAQ Section Subtitle',
              name: 'faqSectionSubtitle',
              widget: 'text',
              default: 'Everything you need to know about GHAFRA Nord, membership, events, and how we can help.',
            }
          - label: 'FAQ Items'
            name: 'faqs'
            widget: 'list'
            summary: '{{fields.question}}'
            fields:
              - { label: 'Question', name: 'question', widget: 'string' }
              - { label: 'Answer', name: 'answer', widget: 'text' }

      - label: 'Programs Page'
        name: 'programs'
        file: 'content/programs.md'
        fields:
          - {
              label: 'Meta Description',
              name: 'metaDescription',
              widget: 'text',
              hint: 'SEO description shown in search engine results.',
            }
          - { label: 'Page Title', name: 'title', widget: 'string' }
          - { label: 'Page Subtitle', name: 'subtitle', widget: 'text' }
          - {
              label: 'Program Detail Back Link Text',
              name: 'detailBackLinkText',
              widget: 'string',
              default: 'All Activities',
            }
          - {
              label: 'Integration Detail Image Alt Text One',
              name: 'integrationImageOneAlt',
              widget: 'string',
              default: 'Integration support guidance illustration one',
            }
          - {
              label: 'Integration Detail Image Alt Text Two',
              name: 'integrationImageTwoAlt',
              widget: 'string',
              default: 'Integration support guidance illustration two',
            }
          - {
              label: 'Programs Section Title',
              name: 'programsSectionTitle',
              widget: 'string',
              default: 'Programs',
            }
          - {
              label: 'Programs Section Subtitle',
              name: 'programsSectionSubtitle',
              widget: 'text',
              default: 'Our core programs that support the Ghanaian community in Lille.',
            }
          - {
              label: 'Events Section Title',
              name: 'eventsSectionTitle',
              widget: 'string',
              default: 'Activities & Events',
            }
          - {
              label: 'Events Section Subtitle',
              name: 'eventsSectionSubtitle',
              widget: 'text',
              default: "GHAFRA has lots of activities and events all year round. Mark your calendars so you don't miss a beat.",
            }
          - label: 'Activities & Events'
            name: 'events'
            widget: 'list'
            summary: '{{fields.title}} — {{fields.when}}'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'When', name: 'when', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - {
                  label: 'Icon',
                  name: 'icon',
                  widget: 'select',
                  options:
                    [
                      'users',
                      'smile',
                      'calendar',
                      'sparkles',
                      'chat',
                      'trophy',
                    ],
                  default: 'calendar',
                  hint: 'Choose an icon for this event',
                }
          - { label: 'Body', name: 'body', widget: 'markdown' }

      - label: 'Get Involved'
        name: 'get-involved'
        file: 'content/get-involved.md'
        fields:
          - {
              label: 'Meta Description',
              name: 'metaDescription',
              widget: 'text',
              hint: 'SEO description shown in search engine results.',
            }
          - { label: 'Page Title', name: 'title', widget: 'string' }
          - {
              label: 'Donate Section Title',
              name: 'donateTitle',
              widget: 'string',
            }
          - {
              label: 'Donate Section Body',
              name: 'donateBody',
              widget: 'markdown',
            }
          - label: 'Donation Options'
            name: 'donateOptions'
            widget: 'list'
            fields:
              - { label: 'Amount', name: 'amount', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - {
                  label: 'Custom Amount Option',
                  name: 'isCustomAmount',
                  widget: 'boolean',
                  required: false,
                  default: false,
                  hint: 'Enable this for the donation card that should allow visitors to enter their own amount.',
                }
              - {
                  label: 'Custom Amount Placeholder',
                  name: 'inputPlaceholder',
                  widget: 'string',
                  required: false,
                  default: 'Enter any amount in euros',
                }
              - {
                  label: 'Custom Button Text',
                  name: 'buttonText',
                  widget: 'string',
                  required: false,
                  default: 'Donate',
                }
              - {
                  label: 'Minimum Custom Amount',
                  name: 'minAmount',
                  widget: 'number',
                  required: false,
                  value_type: 'float',
                  min: 1,
                  default: 1,
                  hint: 'Used only when Custom Amount Option is enabled.',
                }
          - label: 'Donation UI'
            name: 'donationUi'
            widget: 'object'
            fields:
              - {
                  label: 'Custom Section Eyebrow',
                  name: 'customSectionEyebrow',
                  widget: 'string',
                }
              - {
                  label: 'Custom Section Title',
                  name: 'customSectionTitle',
                  widget: 'string',
                }
              - {
                  label: 'Custom Section Description',
                  name: 'customSectionDescription',
                  widget: 'text',
                }
              - {
                  label: 'Custom Amount Label',
                  name: 'customAmountLabel',
                  widget: 'string',
                }
              - {
                  label: 'Fixed Button Prefix',
                  name: 'fixedButtonPrefix',
                  widget: 'string',
                }
              - {
                  label: 'Ready Message',
                  name: 'readyMessage',
                  widget: 'string',
                  hint: 'Use {amount} where the formatted amount should appear.',
                }
              - {
                  label: 'Minimum Message',
                  name: 'minimumMessage',
                  widget: 'string',
                  hint: 'Use {amount} where the formatted amount should appear.',
                }
              - { label: 'Modal Title', name: 'modalTitle', widget: 'string' }
              - { label: 'Modal Message', name: 'modalMessage', widget: 'text' }
              - {
                  label: 'Modal Close Button Text',
                  name: 'modalCloseText',
                  widget: 'string',
                }
              - label: 'Validation Errors'
                name: 'errors'
                widget: 'object'
                fields:
                  - {
                      label: 'Empty Amount Error',
                      name: 'emptyAmount',
                      widget: 'string',
                    }
                  - {
                      label: 'Invalid Amount Error',
                      name: 'invalidAmount',
                      widget: 'string',
                    }
                  - {
                      label: 'Minimum Amount Error',
                      name: 'minimumAmount',
                      widget: 'string',
                      hint: 'Use {amount} where the formatted amount should appear.',
                    }
          - {
              label: 'Member Carousel Section Title',
              name: 'memberCarouselTitle',
              widget: 'string',
              default: 'Our Community Members',
            }
          - {
              label: 'Member Carousel Section Subtitle',
              name: 'memberCarouselSubtitle',
              widget: 'text',
              default: 'Meet the vibrant individuals who make up the GHAFRA Nord family.',
            }
          - label: 'Member Carousel Images'
            name: 'memberImages'
            widget: 'list'
            summary: '{{fields.image}}'
            field: { label: 'Image', name: 'image', widget: 'image' }
          - {
              label: 'Membership Section Title',
              name: 'membershipTitle',
              widget: 'string',
            }
          - {
              label: 'Membership Section Body',
              name: 'membershipBody',
              widget: 'markdown',
            }
          - label: 'Membership Details'
            name: 'membershipInfo'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
          - label: 'Membership Form'
            name: 'membershipForm'
            widget: 'object'
            fields:
              - { label: 'Form Title', name: 'title', widget: 'string' }
              - { label: 'Form Intro', name: 'intro', widget: 'text' }
              - {
                  label: 'Success Title',
                  name: 'successTitle',
                  widget: 'string',
                }
              - {
                  label: 'Success Message',
                  name: 'successMessage',
                  widget: 'text',
                }
              - { label: 'Error Intro', name: 'errorIntro', widget: 'text' }
              - {
                  label: 'Submit Button Text',
                  name: 'submitText',
                  widget: 'string',
                }
              - {
                  label: 'Submitting Button Text',
                  name: 'submittingText',
                  widget: 'string',
                }
              - label: 'Field Labels and Placeholders'
                name: 'fields'
                widget: 'object'
                fields:
                  - {
                      label: 'First Name Label',
                      name: 'firstNameLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'First Name Placeholder',
                      name: 'firstNamePlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Last Name Label',
                      name: 'lastNameLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Last Name Placeholder',
                      name: 'lastNamePlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Email Label',
                      name: 'emailLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Email Placeholder',
                      name: 'emailPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Phone Label',
                      name: 'phoneLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Phone Placeholder',
                      name: 'phonePlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Status Label',
                      name: 'statusLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Status Placeholder',
                      name: 'statusPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Student Option',
                      name: 'studentOption',
                      widget: 'string',
                    }
                  - {
                      label: 'Working Professional Option',
                      name: 'workingProfessionalOption',
                      widget: 'string',
                    }
                  - {
                      label: 'Retired Option',
                      name: 'retiredOption',
                      widget: 'string',
                    }
                  - {
                      label: 'Other Option',
                      name: 'otherOption',
                      widget: 'string',
                    }
                  - {
                      label: 'School Label',
                      name: 'schoolLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'School Placeholder',
                      name: 'schoolPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Program Label',
                      name: 'programLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Program Placeholder',
                      name: 'programPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Current Role Label',
                      name: 'currentRoleLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Current Role Placeholder',
                      name: 'currentRolePlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Previous Role Label',
                      name: 'previousRoleLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Previous Role Placeholder',
                      name: 'previousRolePlaceholder',
                      widget: 'string',
                    }
                  - { label: 'City Label', name: 'cityLabel', widget: 'string' }
                  - {
                      label: 'City Placeholder',
                      name: 'cityPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Special Talent Label',
                      name: 'specialTalentLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Special Talent Optional Label',
                      name: 'specialTalentOptionalLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Special Talent Placeholder',
                      name: 'specialTalentPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Message Label',
                      name: 'messageLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Message Placeholder',
                      name: 'messagePlaceholder',
                      widget: 'string',
                    }

      - label: 'Contact Us'
        name: 'contact'
        file: 'content/contact.md'
        fields:
          - {
              label: 'Meta Description',
              name: 'metaDescription',
              widget: 'text',
              hint: 'SEO description shown in search engine results.',
            }
          - { label: 'Page Title', name: 'title', widget: 'string' }
          - { label: 'Subtitle', name: 'subtitle', widget: 'text' }
          - {
              label: 'Contact Info Section Title',
              name: 'contactInfoTitle',
              widget: 'string',
              default: 'Get in Touch',
            }
          - { label: 'Address Label', name: 'addressLabel', widget: 'string' }
          - { label: 'Phone Label', name: 'phoneLabel', widget: 'string' }
          - { label: 'Email Label', name: 'emailLabel', widget: 'string' }
          - {
              label: 'Office Hours Label',
              name: 'officeHoursLabel',
              widget: 'string',
            }
          - { label: 'Address', name: 'address', widget: 'string' }
          - { label: 'Phone', name: 'phone', widget: 'string' }
          - { label: 'Email', name: 'email', widget: 'string' }
          - { label: 'Office Hours', name: 'officeHours', widget: 'string' }
          - label: 'Contact Form'
            name: 'form'
            widget: 'object'
            fields:
              - { label: 'Form Title', name: 'title', widget: 'string' }
              - {
                  label: 'Success Title',
                  name: 'successTitle',
                  widget: 'string',
                }
              - {
                  label: 'Success Message',
                  name: 'successMessage',
                  widget: 'text',
                }
              - { label: 'Error Intro', name: 'errorIntro', widget: 'text' }
              - {
                  label: 'Submit Button Text',
                  name: 'submitText',
                  widget: 'string',
                }
              - {
                  label: 'Sending Button Text',
                  name: 'sendingText',
                  widget: 'string',
                }
              - label: 'Field Labels and Placeholders'
                name: 'fields'
                widget: 'object'
                fields:
                  - { label: 'Name Label', name: 'nameLabel', widget: 'string' }
                  - {
                      label: 'Name Placeholder',
                      name: 'namePlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Email Label',
                      name: 'emailLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Email Placeholder',
                      name: 'emailPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Subject Label',
                      name: 'subjectLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Subject Placeholder',
                      name: 'subjectPlaceholder',
                      widget: 'string',
                    }
                  - {
                      label: 'Message Label',
                      name: 'messageLabel',
                      widget: 'string',
                    }
                  - {
                      label: 'Message Placeholder',
                      name: 'messagePlaceholder',
                      widget: 'string',
                    }

  - name: 'settings'
    label: 'Site Settings'
    files:
      - label: 'General Settings'
        name: 'general'
        file: 'content/settings.json'
        format: 'json'
        fields:
          - { label: 'Site Name', name: 'siteName', widget: 'string' }
          - { label: 'Site URL', name: 'siteUrl', widget: 'string' }
          - {
              label: 'Site Description',
              name: 'siteDescription',
              widget: 'text',
            }
          - label: 'Social Links'
            name: 'socialLinks'
            widget: 'object'
            fields:
              - {
                  label: 'Facebook',
                  name: 'facebook',
                  widget: 'string',
                  required: false,
                }
              - {
                  label: 'Twitter',
                  name: 'twitter',
                  widget: 'string',
                  required: false,
                }
              - {
                  label: 'Instagram',
                  name: 'instagram',
                  widget: 'string',
                  required: false,
                }
              - {
                  label: 'LinkedIn',
                  name: 'linkedin',
                  widget: 'string',
                  required: false,
                }
              - {
                  label: 'YouTube',
                  name: 'youtube',
                  widget: 'string',
                  required: false,
                }
          - { label: 'Contact Email', name: 'contactEmail', widget: 'string' }
          - { label: 'Contact Phone', name: 'contactPhone', widget: 'string' }
          - { label: 'Address', name: 'address', widget: 'string' }
          - label: 'Navigation'
            name: 'navigation'
            widget: 'object'
            fields:
              - label: 'Main Links'
                name: 'mainLinks'
                widget: 'list'
                summary: '{{fields.name}}'
                fields:
                  - { label: 'Link Text', name: 'name', widget: 'string' }
                  - { label: 'Link URL', name: 'href', widget: 'string' }
              - label: 'Member Button'
                name: 'memberButton'
                widget: 'object'
                fields:
                  - { label: 'Button Text', name: 'text', widget: 'string' }
                  - { label: 'Button URL', name: 'href', widget: 'string' }
              - label: 'Donate Button'
                name: 'donateButton'
                widget: 'object'
                fields:
                  - { label: 'Button Text', name: 'text', widget: 'string' }
                  - { label: 'Button URL', name: 'href', widget: 'string' }
          - label: 'Footer'
            name: 'footer'
            widget: 'object'
            fields:
              - {
                  label: 'Quick Links Title',
                  name: 'quickLinksTitle',
                  widget: 'string',
                }
              - label: 'Quick Links'
                name: 'quickLinks'
                widget: 'list'
